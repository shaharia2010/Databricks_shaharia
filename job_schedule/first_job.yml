resources:
  jobs:
    update_user:
      name: update_user
      schedule:
        quartz_cron_expression: 46 0 21 * * ?
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tasks:
        - task_key: extract_transform_load
          notebook_task:
            notebook_path: BZ_layer_read.ipynb
            source: GIT
      git_source:
        git_url: https://github.com/shaharia2010/Databricks_shaharia.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
